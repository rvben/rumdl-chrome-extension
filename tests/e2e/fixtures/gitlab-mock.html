<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitLab Mock - rumdl E2E Test</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 40px; background: #fafafa; }
    .note-textarea { width: 100%; min-height: 200px; padding: 12px; font-family: ui-monospace, monospace; font-size: 14px; border: 1px solid #dbdbdb; border-radius: 4px; resize: vertical; }
    .md-header { display: flex; gap: 4px; padding: 8px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 4px 4px 0 0; }
  </style>
</head>
<body>
  <h2>Add a comment</h2>
  <div class="timeline-content">
    <div class="md-header">
      <button type="button">Bold</button>
      <button type="button">Italic</button>
    </div>
    <textarea
      id="note-body"
      class="note-textarea js-markdown-area js-gfm-input"
      data-supports-quick-actions="true"
      placeholder="Write a comment..."
    ></textarea>
  </div>
</body>
</html>
