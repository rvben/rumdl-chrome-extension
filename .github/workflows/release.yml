name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: make install

      - name: Full check
        run: make check

      - name: Package
        run: make package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rumdl-extension.zip
          generate_release_notes: true
