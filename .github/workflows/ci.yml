name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Unit tests
        run: make test-unit

      - name: Build
        run: make build

      - name: Package
        run: make package

      - name: Check extension size
        run: make check-size

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: rumdl-extension
          path: rumdl-extension.zip
